services:
  - type: web
    name: stayready-ml
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements-render.txt"
    startCommand: "uvicorn main-render:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: "/health"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
