[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.19.0"

[[redirects]]
  from = "/api/*"
to = "https://stayready-final-backend.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/predict"
  to = "https://stayready-final.onrender.com/predict"
  status = 200

[context.production]
  environment = { VITE_ENVIRONMENT = "production" }
